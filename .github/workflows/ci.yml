name: Retail Sales Analytics CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      # Step 1 - Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2 - Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3 - Install Dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl jupyter nbformat

      # Step 4 - Verify Python Version
      - name: Check Python Version
        run: python --version

      # Step 5 - Verify Notebook Exists
      - name: Verify Jupyter Notebook
        run: |
          test -f notebooks/Retail_Data_Transformation.ipynb

      # Step 6 - Verify Power BI Dashboard Exists
      - name: Verify Power BI Dashboard
        run: |
          test -f dashboard/Retail_Sales_Dashboard.pbix

      # Step 7 - Verify Excel Files Exist
      - name: Verify Excel Files
        run: |
          test -f transformed_data/Customers_Transformed.xlsx
          test -f transformed_data/Orders_Transformed.xlsx
          test -f transformed_data/Products_Transformed.xlsx
          test -f transformed_data/Location_Transformed.xlsx

      # Step 8 - Validate Excel Files
      - name: Validate Excel Files using Pandas
        run: |
          python <<EOF
          import pandas as pd

          files = [
              "transformed_data/Customers_Transformed.xlsx",
              "transformed_data/Orders_Transformed.xlsx",
              "transformed_data/Products_Transformed.xlsx",
              "transformed_data/Location_Transformed.xlsx"
          ]

          for file in files:
              df = pd.read_excel(file)
              print(f"{file}")
              print(f"Rows    : {df.shape[0]}")
              print(f"Columns : {df.shape[1]}")
              print("-"*40)

          print("All Excel files validated successfully.")
          EOF

      # Step 9 - Upload Dashboard
      - name: Upload Power BI Dashboard
        uses: actions/upload-artifact@v4
        with:
          name: PowerBI-Dashboard
          path: dashboard/

      # Step 10 - Upload Excel Files
      - name: Upload Excel Files
        uses: actions/upload-artifact@v4
        with:
          name: Transformed-Excel-Files
          path: transformed_data/

      # Step 11 - Upload Notebook
      - name: Upload Jupyter Notebook
        uses: actions/upload-artifact@v4
        with:
          name: Jupyter-Notebook
          path: notebooks/
