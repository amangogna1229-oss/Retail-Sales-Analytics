name: Retail Sales Analytics CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install Required Libraries
      - name: Install Python Libraries
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy openpyxl jupyter nbformat

      # Verify Notebook Exists
      - name: Verify Jupyter Notebook
        run: |
          test -f "Jupyter notebooks/Retail_Data_Transformation.ipynb"

      # Validate Dataset
      - name: Validate Raw Dataset
        run: |
          python - <<EOF
          import pandas as pd

          files = [
              "Raw Dataset/Customers.csv",
              "Raw Dataset/Orders.csv",
              "Raw Dataset/Products.csv",
              "Raw Dataset/Location.csv"
          ]

          for file in files:
              try:
                  df = pd.read_csv(file, encoding="latin1")
                  print(f"{file} : {df.shape}")
              except Exception:
                  # Try semicolon-separated files
                  df = pd.read_csv(file, sep=";", encoding="latin1")
                  print(f"{file} : {df.shape}")

          print("All datasets validated successfully.")
          EOF

      # Upload Notebook
      - name: Upload Notebook
        uses: actions/upload-artifact@v4
        with:
          name: Jupyter-Notebook
          path: "Jupyter notebooks/"

      # Upload Dashboard
      - name: Upload Dashboard
        uses: actions/upload-artifact@v4
        with:
          name: Dashboard
          path: Dashboard/
