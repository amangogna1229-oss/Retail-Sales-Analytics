name: Retail Sales Analytics CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # pip install -r "Requirements/Requirements.txt"

      - name: Check Python Version
        run: python --version

      - name: Show Repository Structure
        run: |
          pwd
          ls -R

      - name: Verify Jupyter Notebook
        run: |
          test -f "Jupyter notebooks/Retail_Data_Transformation.ipynb"

      - name: Verify Raw Dataset Files
        run: |
          test -f "Raw Dataset/Customers.csv"
          test -f "Raw Dataset/Orders.csv"
          test -f "Raw Dataset/Products.csv"
          test -f "Raw Dataset/Location.csv"

      - name: Validate CSV Files using Pandas
        run: |
          python << EOF
          import pandas as pd

          files = [
              "Raw Dataset/Customers.csv",
              "Raw Dataset/Orders.csv",
              "Raw Dataset/Products.csv",
              "Raw Dataset/Location.csv"
          ]

          for file in files:
              df = pd.read_csv(file, encoding="latin1")
              print("="*50)
              print(file)
              print("Rows :", df.shape[0])
              print("Columns :", df.shape[1])

          print("All CSV files loaded successfully.")
          EOF

      - name: Upload Notebook Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jupyter-Notebook
          path: "Jupyter notebooks/"

      - name: Upload Dashboard Screenshots
        uses: actions/upload-artifact@v4
        with:
          name: Dashboard-Screenshots
          path: Dashboard/
