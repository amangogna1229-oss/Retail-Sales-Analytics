name: Retail Sales Analytics CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Requirements/Requirements.txt

      - name: Verify Jupyter Notebook
        run: |
          test -f "Jupyter notebooks/Retail_Data_Transformation.ipynb"

      - name: Validate Dataset
        run: |
          python - <<EOF
          import pandas as pd

          customers = pd.read_csv("Raw Dataset/Customers.csv", encoding="latin1")
          orders = pd.read_csv("Raw Dataset/Orders.csv", encoding="latin1")
          products = pd.read_csv("Raw Dataset/Products.csv", encoding="latin1")
          location = pd.read_csv("Raw Dataset/Location.csv", encoding="latin1")

          print("All datasets loaded successfully.")
          print("Customers:", customers.shape)
          print("Orders:", orders.shape)
          print("Products:", products.shape)
          print("Location:", location.shape)
          EOF

      - name: Upload Notebook
        uses: actions/upload-artifact@v4
        with:
          name: Jupyter-Notebook
          path: "Jupyter notebooks/"

      - name: Upload Dashboard
        uses: actions/upload-artifact@v4
        with:
          name: Dashboard
          path: Dashboard/
