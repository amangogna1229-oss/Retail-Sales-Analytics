name: Retail Sales Analytics CI Pipeline

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python Version
        run: python --version

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Required Libraries
        run: |
          pip install pandas
          pip install numpy
          pip install openpyxl
          pip install jupyter
          pip install nbformat

      - name: Validate Raw Dataset
        run: |
          python - <<EOF
          import pandas as pd

          files = [
              "Raw Dataset/Customers.csv",
              "Raw Dataset/Orders.csv",
              "Raw Dataset/Products.csv",
              "Raw Dataset/Location.csv"
          ]

          for file in files:
              df = pd.read_csv(file, encoding="latin1")
              print(f"{file} Loaded Successfully")
              print(f"Rows : {df.shape[0]}")
              print(f"Columns : {df.shape[1]}")
          EOF

      - name: Check Missing Values
        run: |
          python - <<EOF
          import pandas as pd

          files = [
              "Raw Dataset/Customers.csv",
              "Raw Dataset/Orders.csv",
              "Raw Dataset/Products.csv",
              "Raw Dataset/Location.csv"
          ]

          for file in files:
              df = pd.read_csv(file, encoding="latin1")
              print(f"\n{file}")
              print(df.isnull().sum())
          EOF

      - name: Validate Jupyter Notebook
        run: |
          jupyter nbconvert --to notebook --execute "Jupyter Notebooks/Retail_Data_Transformation.ipynb"

      - name: Check Repository Structure
        run: |
          ls -R

      - name: CI Validation Successful
        run: |
          echo "======================================="
          echo "Retail Sales Analytics CI Passed"
          echo "Datasets Validated Successfully"
          echo "Notebook Executed Successfully"
          echo "Repository Validation Completed"
          echo "======================================="
